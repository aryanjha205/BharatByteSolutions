{% extends 'base.html' %}

{% block title %}Sign In & Register | Bharat Byte{% endblock %}

{% block content %}
<section class="py-5 d-flex align-items-center" style="min-height: calc(100vh - 200px);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                
                <!-- Main Authentication Card -->
                <div class="glass-panel" id="auth-panel-container">
                    
                    <!-- Tab toggle header -->
                    <div class="d-flex text-center mb-4 border-bottom pb-2">
                        <div class="flex-fill">
                            <button id="toggle-login-btn" class="btn btn-link text-decoration-none fw-bold fs-5 text-primary border-bottom border-primary border-3 pb-2 w-100 rounded-0">Login</button>
                        </div>
                        <div class="flex-fill">
                            <button id="toggle-register-btn" class="btn btn-link text-decoration-none fw-bold fs-5 text-muted pb-2 w-100 rounded-0">Register</button>
                        </div>
                    </div>

                    <!-- 1. LOGIN FORM CONTEXT -->
                    <div id="login-form-wrapper">
                        <form id="auth-login-form">
                            <div class="mb-3">
                                <label class="small fw-semibold text-muted mb-1">Email Address</label>
                                <input type="email" id="login-email" class="form-control form-control-custom" placeholder="e.g. amit@gmail.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="small fw-semibold text-muted mb-1">Password</label>
                                <input type="password" id="login-password" class="form-control form-control-custom" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-6">Sign In Account <i class="bx bx-log-in"></i></button>
                        </form>
                    </div>

                    <!-- 2. REGISTRATION FORM CONTEXT -->
                    <div id="register-form-wrapper" class="d-none">
                        <form id="auth-register-form">
                            <div class="mb-3">
                                <label class="small fw-semibold text-muted mb-1">Full Username</label>
                                <input type="text" id="reg-username" class="form-control form-control-custom" placeholder="e.g. Amit Patel" required>
                            </div>
                            <div class="mb-3">
                                <label class="small fw-semibold text-muted mb-1">Email Address</label>
                                <input type="email" id="reg-email" class="form-control form-control-custom" placeholder="e.g. amit@gmail.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="small fw-semibold text-muted mb-1">Password</label>
                                <input type="password" id="reg-password" class="form-control form-control-custom" placeholder="••••••••" required>
                            </div>
                            
                            <div class="mb-3 row g-2">
                                <div class="col-md-6">
                                    <label class="small fw-semibold text-muted mb-1">Account Role</label>
                                    <select id="reg-role" class="form-select form-control-custom">
                                        <option value="user">User (Discovery)</option>
                                        <option value="lister">Lister (Vendor)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-semibold text-muted mb-1">Referral Code (Optional)</label>
                                    <input type="text" id="reg-referral" class="form-control form-control-custom" placeholder="e.g. BBADMIN">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold fs-6">Create Account <i class="bx bx-user-plus"></i></button>
                        </form>
                    </div>

                    <!-- 3. OTP VERIFICATION SIMULATION PANELS -->
                    <div id="otp-form-wrapper" class="d-none text-center">
                        <div class="p-3 bg-primary bg-opacity-10 text-primary rounded-circle d-inline-block mb-3" style="width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;">
                            <i class="bx bx-envelope fs-2"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Verify Your Email</h4>
                        <p class="text-muted small mb-4">We sent a 6-digit verification code to your registered email address.</p>
                        
                        <div class="alert alert-info py-2 small text-center mb-3">
                            <strong>Sandbox Verification Preview OTP:</strong> <span id="sandbox-otp-code" class="fw-extrabold text-primary">000000</span>
                        </div>

                        <form id="auth-otp-form">
                            <div class="mb-4">
                                <input type="text" id="otp-code-input" class="form-control form-control-custom text-center py-2 fs-3 fw-bold letter-spacing-lg" placeholder="123456" maxlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-6">Verify & Launch <i class="bx bx-check-shield"></i></button>
                        </form>
                    </div>

                </div>

            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggleLogin = document.getElementById('toggle-login-btn');
        const toggleReg = document.getElementById('toggle-register-btn');
        
        const loginWrapper = document.getElementById('login-form-wrapper');
        const regWrapper = document.getElementById('register-form-wrapper');
        const otpWrapper = document.getElementById('otp-form-wrapper');
        
        const loginForm = document.getElementById('auth-login-form');
        const regForm = document.getElementById('auth-register-form');
        const otpForm = document.getElementById('auth-otp-form');

        // Toggle Views Animation binds
        toggleLogin.addEventListener('click', () => {
            toggleLogin.className = "btn btn-link text-decoration-none fw-bold fs-5 text-primary border-bottom border-primary border-3 pb-2 w-100 rounded-0";
            toggleReg.className = "btn btn-link text-decoration-none fw-bold fs-5 text-muted pb-2 w-100 rounded-0";
            loginWrapper.classList.remove('d-none');
            regWrapper.classList.add('d-none');
            otpWrapper.classList.add('d-none');
        });

        toggleReg.addEventListener('click', () => {
            toggleReg.className = "btn btn-link text-decoration-none fw-bold fs-5 text-primary border-bottom border-primary border-3 pb-2 w-100 rounded-0";
            toggleLogin.className = "btn btn-link text-decoration-none fw-bold fs-5 text-muted pb-2 w-100 rounded-0";
            regWrapper.classList.remove('d-none');
            loginWrapper.classList.add('d-none');
            otpWrapper.classList.add('d-none');
        });

        // AJAX Login submission
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: pass })
                    });
                    const val = await res.json();
                    
                    if (val.status === 'success') {
                        alert(val.message);
                        if (val.role === 'lister') {
                            window.location.href = '/dashboard';
                        } else {
                            window.location.href = '/';
                        }
                    } else {
                        alert(val.message);
                    }
                } catch (err) {
                    console.error(err);
                }
            });
        }

        // AJAX Register submission
        if (regForm) {
            regForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('reg-username').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-password').value;
                const role = document.getElementById('reg-role').value;
                const ref = document.getElementById('reg-referral').value;

                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: name,
                            email: email,
                            password: pass,
                            role: role,
                            referred_by: ref
                        })
                    });
                    const val = await res.json();
                    
                    if (val.status === 'success') {
                        alert(val.message);
                        
                        // Hide selectors, display OTP panel
                        toggleLogin.classList.add('d-none');
                        toggleReg.classList.add('d-none');
                        regWrapper.classList.add('d-none');
                        otpWrapper.classList.remove('d-none');
                        
                        // Display generated OTP preview for sandbox ease
                        document.getElementById('sandbox-otp-code').textContent = val.otp_preview;
                    } else {
                        alert(val.message);
                    }
                } catch (err) {
                    console.error(err);
                }
            });
        }

        // AJAX OTP verify submission
        if (otpForm) {
            otpForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const otp = document.getElementById('otp-code-input').value;

                try {
                    const res = await fetch('/api/auth/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ otp: otp })
                    });
                    const val = await res.json();
                    
                    if (val.status === 'success') {
                        alert(val.message);
                        window.location.href = '/';
                    } else {
                        alert(val.message);
                    }
                } catch (err) {
                    console.error(err);
                }
            });
        }
    });
</script>
{% endblock %}
