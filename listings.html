<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore top street food stalls, student PGs, boys/girls hostels, medical stores, tiffin deliveries, and ATMs near you with verified GPS mapping and simulated AI assistants.">
    <title>Explore Nearby | Bharat Byte Marketplace</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons (Boxicons) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Leaflet.js Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS Stylesheet -->
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="manifest" href="static/manifest.json">
    <link rel="apple-touch-icon" href="static/logo.png">
</head>
<body>

    <!-- Loading Screen Overlay -->
    <div id="loader">
        <div class="loader-content">
            <img src="static/logo.png" alt="Bharat Byte Logo" class="loader-logo mb-3">
            <h2 class="fw-bold" style="letter-spacing: 1px;">BHARAT BYTE</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="text-muted small">Loading local services...</p>
        </div>
    </div>

    <!-- Navigation Header -->
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="static/logo.png" alt="Bharat Byte Logo" class="me-2" style="height: 40px;">
                    <span class="fw-bold fs-4 text-primary" data-translate="app_title">Bharat Byte</span>
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html"><i class="bx bx-home-alt"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="listings.html"><i class="bx bx-compass"></i> Explore</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="listings.html?category=street_food"><i class="bx bx-restaurant"></i> Street Food</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="listings.html?category=pg"><i class="bx bx-bed"></i> Rooms & PG</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn-nav-strangers ms-1" href="strangers.html"><span class="pulse-indicator"></span> Talk to Strangers</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="moreDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                More
                            </a>
                            <ul class="dropdown-menu border-0 shadow" aria-labelledby="moreDropdown">
                                <li><a class="dropdown-item" href="admin_login.html"><i class="bx bx-shield-quarter"></i> Admin Portal</a></li>
                                <li id="nav-lister-studio" class="d-none"><a class="dropdown-item" href="dashboard.html"><i class="bx bx-grid-alt"></i> Lister Studio</a></li>
                            </ul>
                        </li>
                    </ul>
                    
                    <!-- Right Controls System -->
                    <div class="d-flex align-items-center gap-3">
                        
                        <!-- Theme Toggle Button -->
                        <button class="theme-switch-btn" title="Toggle Light/Dark Theme">
                            <i class="bx bx-moon"></i>
                        </button>
                        
                        <!-- Localizer Translator Switcher -->
                        <div class="lang-wrapper">
                            <select id="language-select" class="form-select form-select-sm border-secondary text-dark" style="cursor: pointer; font-weight: 500;">
                                <option value="en">English (EN)</option>
                                <option value="hi">हिन्दी (HI)</option>
                                <option value="gu">ગુજરાતી (GU)</option>
                            </select>
                        </div>

                        <!-- Real-time Database Notifications Trigger -->
                        <div class="dropdown d-none" id="notif-dropdown-wrapper">
                            <button class="btn btn-outline-secondary position-relative rounded-circle p-2" type="button" id="notifDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;">
                                <i class="bx bx-bell fs-5"></i>
                                <span id="notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                            </button>
                            <ul id="notif-list" class="dropdown-menu dropdown-menu-end p-2 border-0 shadow-lg" aria-labelledby="notifDropdown" style="width: 320px; border-radius: 12px; background: var(--bg-card); color: var(--text-main);">
                                <h6 class="dropdown-header text-primary fw-bold mb-2 border-bottom pb-2">Notifications</h6>
                                <div id="notif-items-container">
                                    <li class="text-center py-3 text-muted small">No new notifications.</li>
                                </div>
                            </ul>
                        </div>

                        <!-- User Session Dropdown / Auth CTA -->
                        <div id="auth-cta-container">
                            <a href="auth.html" class="btn btn-primary px-4"><i class="bx bx-log-in"></i> Sign In</a>
                        </div>

                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <div class="split-container">
            
            <!-- Left Side: Directory Listings & Advanced Filters -->
            <div class="sidebar-listings">
                
                <!-- Interactive Quick Filters Header -->
                <div class="card p-3 border-0 bg-light mb-4 shadow-sm" style="border-radius: 12px;">
                    <h5 class="fw-bold mb-3"><i class="bx bx-slider-alt text-primary"></i> Discovery Filters</h5>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-semibold text-muted mb-1">Service Category</label>
                            <select id="filter-category" class="form-select filter-trigger">
                                <option value="all">All Services</option>
                                <option value="street_food">Street Food Stalls</option>
                                <option value="pg">PG Accommodations</option>
                                <option value="hostel">Hostels</option>
                                <option value="room">Rooms & Flats</option>
                                <option value="tiffin">Tiffin Deliveries</option>
                                <option value="laundry">Laundry Services</option>
                                <option value="medical">Pharmacies / Hospitals</option>
                                <option value="atm">ATMs</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-semibold text-muted mb-1">Search Keywords</label>
                            <input type="text" id="filter-search" class="form-control filter-trigger" placeholder="Title, address, keywords...">
                        </div>
                    </div>
                    
                    <div class="row mt-1 g-3">
                        <!-- Price cap -->
                        <div class="col-md-6">
                            <label class="small fw-semibold text-muted d-flex justify-content-between mb-1">
                                <span>Price Ceiling</span>
                                <span class="text-primary fw-bold">₹<span id="price-val-display">20000</span></span>
                            </label>
                            <input type="range" id="filter-price" class="form-range" min="0" max="20000" step="50" value="20000">
                        </div>
                        
                        <!-- Distance Cap -->
                        <div class="col-md-6">
                            <label class="small fw-semibold text-muted d-flex justify-content-between mb-1">
                                <span>Search Radius (GPS required)</span>
                                <span class="text-primary fw-bold" id="distance-val-display">10 km</span>
                            </label>
                            <input type="range" id="filter-distance" class="form-range" min="1" max="50" step="1" value="10">
                        </div>
                    </div>
                    
                    <div class="row mt-1 g-3 align-items-center">
                        <div class="col-md-6">
                            <label class="small fw-semibold text-muted mb-1">Min Overall/Hygiene Rating</label>
                            <select id="filter-rating" class="form-select filter-trigger">
                                <option value="all">Any Rating</option>
                                <option value="4.5">Excellent (4.5+ ⭐)</option>
                                <option value="4.0">Very Good (4.0+ ⭐)</option>
                                <option value="3.5">Good (3.5+ ⭐)</option>
                            </select>
                        </div>
                        <div class="col-md-6 pt-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input filter-trigger" type="checkbox" id="filter-verified">
                                <label class="form-check-label fw-bold text-success" for="filter-verified"><i class="bx bxs-shield-checked"></i> Verified Only</label>
                            </div>
                        </div>
                    </div>

                    <!-- Accommodations Filters Section Toggle -->
                    <div class="accordion accordion-flush mt-3" id="filtersAccordion">
                        <div class="accordion-item bg-transparent">
                            <h2 class="accordion-header" id="flush-headingOne">
                                <button class="accordion-button collapsed py-2 px-0 bg-transparent text-primary fw-semibold small" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                                    Accommodation & Food Specific Filters
                                </button>
                            </h2>
                            <div id="flush-collapseOne" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#filtersAccordion">
                                <div class="accordion-body px-0 py-3">
                                    <div class="row g-3 mb-3">
                                        <div class="col-md-6">
                                            <label class="small fw-semibold text-muted mb-1">Gender Preference</label>
                                            <select id="filter-gender" class="form-select filter-trigger">
                                                <option value="all">All (Boys / Girls)</option>
                                                <option value="male">Boys Only</option>
                                                <option value="female">Girls Only</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="small fw-semibold text-muted mb-1">Furnishing Status</label>
                                            <select id="filter-furnished" class="form-select filter-trigger">
                                                <option value="all">Any Status</option>
                                                <option value="furnished">Furnished</option>
                                                <option value="semi-furnished">Semi-Furnished</option>
                                                <option value="unfurnished">Unfurnished</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div class="row row-cols-2 g-2">
                                        <div class="col">
                                            <div class="form-check">
                                                <input class="form-check-input filter-trigger" type="checkbox" id="filter-ac">
                                                <label class="form-check-label small" for="filter-ac">AC Rooms</label>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="form-check">
                                                <input class="form-check-input filter-trigger" type="checkbox" id="filter-wifi">
                                                <label class="form-check-label small" for="filter-wifi">WiFi Internet</label>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="form-check">
                                                <input class="form-check-input filter-trigger" type="checkbox" id="filter-parking">
                                                <label class="form-check-label small" for="filter-parking">Vehicle Parking</label>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="form-check">
                                                <input class="form-check-input filter-trigger" type="checkbox" id="filter-food">
                                                <label class="form-check-label small" for="filter-food">Food Included</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dynamic Listings Output Grid -->
                <div class="row" id="listings-search-grid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 text-muted">Scanning Bharat Byte database...</p>
                    </div>
                </div>

            </div>

            <!-- Right Side: Interactive Maps Pane -->
            <div class="map-view-panel">
                <div id="leaflet-map"></div>
                
                <!-- Floating GPS indicator coordinates inside map -->
                <input type="hidden" id="user-lat">
                <input type="hidden" id="user-lng">
            </div>

        </div>
        
        <!-- Floating Toggle FAB on Mobile -->
        <button id="mobile-view-toggle-btn" class="floating-toggle-btn">
            <i class="bx bx-map"></i> <span>Show Map</span>
        </button>
    </main>

    <!-- Bootstrap & Leaflet JavaScript Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
