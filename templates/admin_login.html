{% extends 'base.html' %}

{% block title %}Admin Sign In | Bharat Byte{% endblock %}

{% block content %}
<section class="py-5 d-flex align-items-center" style="min-height: calc(100vh - 200px);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel text-center p-5 border-danger">
                    <div class="mb-4">
                        <div class="p-3 bg-danger bg-opacity-10 text-danger rounded-circle d-inline-block mb-3" style="width: 70px; height: 70px; display: flex; justify-content: center; align-items: center;">
                            <i class="bx bx-shield-quarter fs-1"></i>
                        </div>
                        <h3 class="fw-bold mb-1">Administrative Center</h3>
                        <p class="text-muted small">Protected via Master PIN Authorization</p>
                    </div>

                    <form id="admin-pin-login-form">
                        <div class="mb-4">
                            <label class="small fw-semibold text-muted d-block text-start mb-2">Enter Administrative Security PIN</label>
                            <input type="password" id="admin-pin-input" class="form-control form-control-custom text-center py-3 fs-4 fw-bold letter-spacing-lg" placeholder="••••" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-3 fw-bold fs-6">Authorize Console <i class="bx bx-key"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const pinForm = document.getElementById('admin-pin-login-form');
        if (pinForm) {
            pinForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const pin = document.getElementById('admin-pin-input').value;

                try {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pin: pin })
                    });
                    const val = await res.json();
                    
                    if (val.status === 'success') {
                        alert(val.message);
                        window.location.href = '/admin';
                    } else {
                        alert(val.message);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Authorization failed.");
                }
            });
        }
    });
</script>
{% endblock %}
